# Example secret. Real secrets should be sealed with kubeseal or kept in
# an external secret store — never commit the populated version. Copy
# this file to deploy/k8s/20-secret-env.yaml, fill in real values, and
# `kubectl apply` it. It's in .gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: klub-lotto-env
  namespace: klub-lotto
type: Opaque
stringData:
  DANSKESPIL_USERNAME: "<red-konto-username>"
  DANSKESPIL_PASSWORD: "<red-konto-password>"
  ANTHROPIC_API_KEY: "<anthropic-api-key>"
  OPENAI_API_KEY:    "<openai-api-key>"
  XAI_API_KEY:       "<x-ai-api-key>"
  GEMINI_API_KEY:    "<gemini-api-key>"
